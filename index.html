<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靛音もた</title>
    <link rel="icon" href="favicon.png">
    <script src="echarts.js"></script>
</head>
<body style="margin: 0; padding: 0;">
    <div style="height: 200px;" id="TT"></div>
    <script type="text/javascript">
        var chartDom = document.getElementById('TT');
        var myChart = echarts.init(chartDom);
        var option;

        option = {
        graphic: {
            elements: [
            {
                type: 'text',
                left: 'center',
                top: 'center',
                style: {
                text: '靛音もた',
                fontSize: 80,
                fontWeight: 'bold',
                lineDash: [0, 200],
                lineDashOffset: 0,
                fill: 'transparent',
                stroke: '#000',
                lineWidth: 1
                },
                keyframeAnimation: {
                duration: 3000,
                loop: false,
                keyframes: [
                    {
                    percent: 0.7,
                    style: {
                        fill: 'transparent',
                        lineDashOffset: 200,
                        lineDash: [200, 0]
                    }
                    },
                    {
                    // Stop for a while.
                    percent: 0.8,
                    style: {
                        fill: 'transparent'
                    }
                    },
                    {
                    percent: 1,
                    style: {
                        fill: 'black'
                    }
                    }
                ]
                }
            }
            ]
        }
        };

        option && myChart.setOption(option);
    </script>
</body>
</html>
