<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靛音もた - 官方网站</title>
    <link rel="icon" href="favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafaf8;
            color: #444;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
            animation: bodyIn 0.35s ease;
        }
        body.exiting {
            animation: bodyOut 0.18s ease forwards;
        }
        @keyframes bodyIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes bodyOut {
            to { opacity: 0; }
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
            animation: navIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes navIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 6px 16px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; }
        .floating-nav nav a {
            display: block;
            padding: 6px 14px;
            text-decoration: none;
            color: #999;
            font-size: 0.82rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            position: relative;
        }
        .floating-nav nav a:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: rgba(58,58,140,0.1);
            font-weight: 500;
            animation: pillIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes pillIn {
            from { background: transparent; color: #999; }
            to   { background: rgba(58,58,140,0.1); color: #3a3a8c; }
        }

        .home-illust-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        .home-illust-bg img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.35;
        }
        .home-illust-bg .placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #e8e8f8 0%, #f4f4f0 60%, #fafaf8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d0d0d8;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .home-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 24px 60px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        .home-avatar {
            width: 150px; height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.85rem;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 4px 32px rgba(58,58,140,0.1);
            border: 2px solid rgba(255,255,255,0.8);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        .home-avatar img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .home-title { text-align: center; margin: 20px 0 8px; }
        .home-title h1 {
            font-size: 2rem;
            font-weight: 400;
            color: #3a3a8c;
            letter-spacing: 6px;
        }
        .home-title p {
            color: #aaa;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .card-row-wrap { margin-top: 36px; width: 100%; }
        .card-row-wrap .label {
            font-size: 0.8rem;
            color: #bbb;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
        }
        .card-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            justify-content: center;
        }
        .card-row::-webkit-scrollbar { height: 4px; }
        .card-row::-webkit-scrollbar-track { background: transparent; }
        .card-row::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .card {
            flex: 0 0 200px;
            scroll-snap-align: start;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            padding: 24px 16px;
            text-decoration: none;
            color: #444;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.1);
        }
        .card .card-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(58,58,140,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.3rem;
            transition: background 0.3s;
        }
        .card:hover .card-icon { background: rgba(58,58,140,0.12); }
        .card .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #3a3a8c;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .card .card-desc {
            font-size: 0.78rem;
            color: #aaa;
            line-height: 1.5;
        }

        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px;
            color: #ddd;
            font-size: 0.8rem;
        }

        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 4px 6px;
            }
            .floating-nav .logo { font-size: 0.85rem; padding: 5px 10px; }
            .floating-nav nav a { font-size: 0.72rem; padding: 5px 8px; }
            .home-content { padding: 80px 16px 40px; }
            .home-avatar { width: 120px; height: 120px; }
            .home-title h1 { font-size: 1.5rem; }
            .card { flex: 0 0 160px; padding: 18px 12px; }
            .card-row { justify-content: flex-start; padding-left: 8px; }
        }
    </style>
</head>
<body>

    <div class="floating-nav">
        <a href="index.html" class="logo">靛音もた</a>
        <nav>
            <a href="index.html" class="active">首页</a>
            <a href="profile.html">角色</a>
            <a href="music.html">音乐</a>
            <a href="news.html">动态</a>
            <a href="download.html">下载</a>
        </nav>
    </div>

    <div class="home-illust-bg">
        <!-- 替换为：<img src="立绘图片路径" alt=""> -->
        <div class="placeholder">立绘背景</div>
    </div>

    <div class="home-content">
        <div class="home-avatar">
            <!-- 替换为：<img src="头像路径" alt="头像"> -->
            头像
        </div>
        <div class="home-title">
            <h1>靛音もた</h1>
            <p><!-- 标语 --></p>
        </div>

        <div class="card-row-wrap">
            <div class="label">CONTENTS</div>
            <div class="card-row">
                <a href="profile.html" class="card">
                    <div class="card-icon">👤</div>
                    <div class="card-title">角色档案</div>
                    <div class="card-desc">基本信息与设定</div>
                </a>
                <a href="music.html" class="card">
                    <div class="card-icon">🎵</div>
                    <div class="card-title">音乐作品</div>
                    <div class="card-desc">原创与翻唱歌曲</div>
                </a>
                <a href="news.html" class="card">
                    <div class="card-icon">📢</div>
                    <div class="card-title">最新动态</div>
                    <div class="card-desc">新闻与活动信息</div>
                </a>
                <a href="download.html" class="card">
                    <div class="card-icon">📥</div>
                    <div class="card-title">下载</div>
                    <div class="card-desc">音源 / 工具 / 素材</div>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 靛音もた</p>
    </footer>

    <script>
    (function() {
        var links = document.querySelectorAll('.floating-nav nav a, .card-row a');
        links.forEach(function(a) {
            a.addEventListener('click', function(e) {
                var href = this.getAttribute('href');
                if (!href || href === '#') return;
                e.preventDefault();
                document.body.classList.add('exiting');
                setTimeout(function() {
                    window.location.href = href;
                }, 160);
            });
        });
    })();
    </script>

</body>
</html>
