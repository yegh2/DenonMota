    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafaf8;
            color: #444;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 1.15rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; position: relative; }
        .floating-nav .indicator {
            position: absolute;
            top: 8px;
            height: 36px;
            border-radius: 20px;
            background: rgba(58,58,140,0.1);
            z-index: -1;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .floating-nav nav a {
            display: block;
            padding: 8px 18px;
            text-decoration: none;
            color: #999;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: transparent;
            font-weight: 500;
        }

        .sub-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 0 80px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sec-title {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3a3a8c;
            margin-bottom: 36px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
            letter-spacing: 2px;
        }

        .dl-section { margin-bottom: 40px; }
        .dl-section h3 {
            font-weight: 400;
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 16px;
        }
        .dl-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.25s;
        }
        .dl-item:hover {
            border-color: #d0d0e8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .dl-item .info { flex: 1; min-width: 0; }
        .dl-item .name {
            font-size: 1.05rem;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dl-item .detail {
            font-size: 0.88rem;
            color: #bbb;
            margin-top: 2px;
        }
        .dl-item .dl-link {
            padding: 10px 28px;
            border: 1px solid #3a3a8c;
            color: #3a3a8c;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.95rem;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 16px;
            transition: all 0.25s;
        }
        .dl-item .dl-link:hover {
            background: #3a3a8c;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 32px;
            color: #ddd;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .sub-page { padding: 100px 24px 80px; }
        }
        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 6px 8px;
            }
            .floating-nav .logo { font-size: 0.95rem; padding: 6px 12px; }
            .floating-nav nav a { font-size: 0.8rem; padding: 6px 10px; }
            .sub-page { padding: 80px 16px 60px; }
            .dl-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            .dl-item .dl-link { margin-left: 0; }
        }
    </style>
</head>
<body>

    <script>
    (function() {
        var indicator = document.querySelector('.floating-nav .indicator');
        var nav = document.querySelector('.floating-nav nav');
        var activeLink = nav.querySelector('a.active');
        var logo = document.querySelector('.floating-nav .logo');
        if (!indicator || !activeLink || !nav) return;

        var navRect = nav.getBoundingClientRect();
        var linkRect = activeLink.getBoundingClientRect();
        var targetLeft = linkRect.left - navRect.left;
        var targetWidth = linkRect.width;

        var fromLeft = localStorage.getItem('navFromLeft');
        var fromWidth = localStorage.getItem('navFromWidth');
        localStorage.removeItem('navFromLeft');
        localStorage.removeItem('navFromWidth');

        var startLeft, startWidth;
        if (fromLeft !== null && fromWidth !== null) {
            startLeft = parseFloat(fromLeft);
            startWidth = parseFloat(fromWidth);
        } else {
            var logoRect = logo.getBoundingClientRect();
            startLeft = logoRect.right - navRect.left + 4;
            startWidth = 0;
        }

        indicator.style.transition = 'none';
        indicator.style.left = startLeft + 'px';
        indicator.style.width = startWidth + 'px';
        void indicator.offsetHeight;

        indicator.style.transition = 'left 0.5s cubic-bezier(0.16, 1, 0.3, 1), width 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
        indicator.style.left = targetLeft + 'px';
        indicator.style.width = targetWidth + 'px';

        nav.querySelectorAll('a').forEach(function(a) {
            a.addEventListener('click', function() {
                var r = this.getBoundingClientRect();
                localStorage.setItem('navFromLeft', r.left - navRect.left);
                localStorage.setItem('navFromWidth', r.width);
            });
        });
    })();
    </script>
