<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐作品 - 靛音もた</title>
    <link rel="icon" href="favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafaf8;
            color: #444;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 1.15rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; }
        .floating-nav nav a {
            display: block;
            padding: 8px 18px;
            text-decoration: none;
            color: #999;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: rgba(58,58,140,0.1);
            font-weight: 500;
            animation: pillSlide 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes pillSlide {
            from { background: transparent; }
            to   { background: rgba(58,58,140,0.1); }
        }

        .sub-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 0 80px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sec-title {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3a3a8c;
            margin-bottom: 36px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
            letter-spacing: 2px;
        }

        .music-item {
            display: flex;
            align-items: center;
            gap: 22px;
            padding: 20px 24px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.25s;
        }
        .music-item:hover {
            border-color: #d0d0e8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .music-thumb {
            width: 64px;
            height: 64px;
            background: #f0f0f0;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.7rem;
        }
        .music-thumb img {
            width: 100%; height: 100%;
            border-radius: 6px;
            object-fit: cover;
        }
        .music-info { flex: 1; min-width: 0; }
        .music-info .title {
            color: #444;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-info .meta {
            color: #bbb;
            font-size: 0.88rem;
            margin-top: 2px;
        }
        .music-links {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .music-links a {
            color: #3a3a8c;
            text-decoration: none;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .music-links a:hover { opacity: 0.7; }

        footer {
            text-align: center;
            padding: 32px;
            color: #ddd;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .sub-page { padding: 100px 24px 80px; }
        }
        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 6px 8px;
            }
            .floating-nav .logo { font-size: 0.95rem; padding: 6px 12px; }
            .floating-nav nav a { font-size: 0.8rem; padding: 6px 10px; }
            .sub-page { padding: 80px 16px 60px; }
            .music-item { padding: 14px 16px; }
            .music-links { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="floating-nav">
        <a href="index.html" class="logo">靛音もた</a>
        <nav>
            <a href="index.html">首页</a>
            <a href="profile.html">角色</a>
            <a href="music.html" class="active">音乐</a>
            <a href="news.html">动态</a>
            <a href="download.html">下载</a>
        </nav>
    </div>

    <div class="sub-page">
        <h2 class="sec-title">音乐作品</h2>

    <footer>

</body>
</html>
