<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新动态 - 靛音もた</title>
    <link rel="icon" href="favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafaf8;
            color: #444;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
            animation: bodyIn 0.35s ease;
        }
        body.exiting {
            animation: bodyOut 0.18s ease forwards;
        }
        @keyframes bodyIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes bodyOut {
            to { opacity: 0; }
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
            animation: navIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes navIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 6px 16px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; }
        .floating-nav nav a {
            display: block;
            padding: 6px 14px;
            text-decoration: none;
            color: #999;
            font-size: 0.82rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            position: relative;
        }
        .floating-nav nav a:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: rgba(58,58,140,0.1);
            font-weight: 500;
            animation: pillIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes pillIn {
            from { background: transparent; color: #999; }
            to   { background: rgba(58,58,140,0.1); color: #3a3a8c; }
        }

        .sub-page {
            max-width: 700px;
            margin: 0 auto;
            padding: 80px 24px 80px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sec-title {
            font-size: 1.3rem;
            font-weight: 400;
            color: #3a3a8c;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
            letter-spacing: 2px;
        }

        .news-item {
            display: flex;
            gap: 24px;
            padding: 20px 24px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.25s;
        }
        .news-item:hover {
            border-color: #d0d0e8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transform: translateX(4px);
        }
        .news-date {
            width: 52px;
            flex-shrink: 0;
            text-align: center;
            color: #3a3a8c;
        }
        .news-date .d {
            font-size: 1.6rem;
            line-height: 1.2;
            font-weight: 300;
        }
        .news-date .m {
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 2px;
        }
        .news-body { flex: 1; }
        .news-body h4 {
            font-weight: 400;
            color: #444;
            margin-bottom: 4px;
            font-size: 1rem;
        }
        .news-body p {
            color: #aaa;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #ddd;
            font-size: 0.8rem;
        }

        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 4px 6px;
            }
            .floating-nav .logo { font-size: 0.85rem; padding: 5px 10px; }
            .floating-nav nav a { font-size: 0.72rem; padding: 5px 8px; }
            .sub-page { padding: 72px 16px 60px; }
            .news-item { flex-direction: column; gap: 8px; padding: 16px 18px; }
            .news-date { width: auto; text-align: left; display: flex; gap: 8px; align-items: baseline; }
        }
    </style>
</head>
<body>

    <div class="floating-nav">
        <a href="index.html" class="logo">靛音もた</a>
        <nav>
            <a href="index.html">首页</a>
            <a href="profile.html">角色</a>
            <a href="music.html">音乐</a>
            <a href="news.html" class="active">动态</a>
            <a href="download.html">下载</a>
        </nav>
    </div>

    <div class="sub-page">
        <h2 class="sec-title">最新动态</h2>

        <div class="news-item">
            <div class="news-date">
                <div class="d">08</div>
                <div class="m">6月</div>
            </div>
            <div class="news-body">
                <h4>新闻标题</h4>
                <p>新闻内容描述。可以写多行，详细介绍这条动态的具体信息。</p>
            </div>
        </div>
        -->
    </div>

    <footer>
        <p>&copy; 2026 靛音もた</p>
    </footer>

    <script>
    (function() {
        var links = document.querySelectorAll('.floating-nav nav a');
        links.forEach(function(a) {
            a.addEventListener('click', function(e) {
                var href = this.getAttribute('href');
                if (!href || href === '#') return;
                e.preventDefault();
                document.body.classList.add('exiting');
                setTimeout(function() {
                    window.location.href = href;
                }, 160);
            });
        });
    })();
    </script>

</body>
</html>
