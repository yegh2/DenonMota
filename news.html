<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新动态 - 靛音もた</title>
    <link rel="icon" href="favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafaf8;
            color: #444;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 1.15rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; position: relative; }
        .floating-nav .indicator {
            position: absolute;
            top: 8px;
            height: 36px;
            border-radius: 20px;
            background: rgba(58,58,140,0.1);
            z-index: -1;
            pointer-events: none;
            transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .floating-nav nav a {
            display: block;
            padding: 8px 18px;
            text-decoration: none;
            color: #999;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: transparent;
            font-weight: 500;
        }

        .sub-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 0 80px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sec-title {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3a3a8c;
            margin-bottom: 36px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
            letter-spacing: 2px;
        }

        .news-item {
            display: flex;
            gap: 24px;
            padding: 24px 28px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.25s;
        }
        .news-item:hover {
            border-color: #d0d0e8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transform: translateX(4px);
        }
        .news-date {
            width: 52px;
            flex-shrink: 0;
            text-align: center;
            color: #3a3a8c;
        }
        .news-date .d {
            font-size: 1.8rem;
            line-height: 1.2;
            font-weight: 300;
        }
        .news-date .m {
            font-size: 0.82rem;
            color: #bbb;
            margin-top: 2px;
        }
        .news-body { flex: 1; }
        .news-body h4 {
            font-weight: 400;
            color: #444;
            margin-bottom: 6px;
            font-size: 1.1rem;
        }
        .news-body p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 32px;
            color: #ddd;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .sub-page { padding: 100px 24px 80px; }
        }
        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 6px 8px;
            }
            .floating-nav .logo { font-size: 0.95rem; padding: 6px 12px; }
            .floating-nav nav a { font-size: 0.8rem; padding: 6px 10px; }
            .sub-page { padding: 80px 16px 60px; }
            .news-item { flex-direction: column; gap: 8px; padding: 16px 18px; }
            .news-date { width: auto; text-align: left; display: flex; gap: 8px; align-items: baseline; }
        }
    </style>
</head>
<body>

    <div class="floating-nav">
        <a href="index.html" class="logo">靛音もた</a>
        <nav>
            <div class="indicator"></div>
            <a href="index.html">首页</a>
            <a href="profile.html">角色</a>
            <a href="music.html">音乐</a>
            <a href="news.html" class="active">动态</a>
            <a href="download.html">下载</a>
        </nav>
    </div>

    <div class="sub-page">
        <h2 class="sec-title">最新动态</h2>
        <!-- 在这里添加新闻，示例格式： -->
        <!--
        <div class="news-item">
            <div class="news-date">
                <div class="d">08</div>
                <div class="m">6月</div>
            </div>
            <div class="news-body">
                <h4>新闻标题</h4>
                <p>新闻内容描述。可以写多行，详细介绍这条动态的具体信息。</p>
            </div>
        </div>
        -->
    </div>

    <footer>
        <p>&copy; 2026 靛音もた</p>
    </footer>

    <script>
    (function() {
        var indicator = document.querySelector('.floating-nav .indicator');
        var nav = document.querySelector('.floating-nav nav');
        var activeLink = nav.querySelector('a.active');
        var logo = document.querySelector('.floating-nav .logo');
        if (!indicator || !activeLink || !nav) return;

        var navRect = nav.getBoundingClientRect();
        var linkRect = activeLink.getBoundingClientRect();
        var targetLeft = linkRect.left - navRect.left;
        var targetWidth = linkRect.width;

        var fromLeft = localStorage.getItem('navFromLeft');
        var fromWidth = localStorage.getItem('navFromWidth');
        localStorage.removeItem('navFromLeft');
        localStorage.removeItem('navFromWidth');

        var startLeft, startWidth;
        if (fromLeft !== null && fromWidth !== null) {
            startLeft = parseFloat(fromLeft);
            startWidth = parseFloat(fromWidth);
        } else {
            var logoRect = logo.getBoundingClientRect();
            startLeft = logoRect.right - navRect.left + 4;
            startWidth = 0;
        }

        indicator.style.transition = 'none';
        indicator.style.left = startLeft + 'px';
        indicator.style.width = startWidth + 'px';

        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                indicator.style.transition = 'left 0.5s cubic-bezier(0.16, 1, 0.3, 1), width 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
                indicator.style.left = targetLeft + 'px';
                indicator.style.width = targetWidth + 'px';
            });
        });

        nav.querySelectorAll('a').forEach(function(a) {
            a.addEventListener('click', function() {
                var r = this.getBoundingClientRect();
                localStorage.setItem('navFromLeft', r.left - navRect.left);
                localStorage.setItem('navFromWidth', r.width);
            });
        });
    })();
    </script>

</body>
</html>
