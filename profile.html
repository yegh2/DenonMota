<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色档案 - 靛音もた</title>
    <link rel="icon" href="favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f9f8fc;
            color: #403c4f;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .floating-nav {
            position: fixed;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(252,252,253,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 2px 24px rgba(58,58,140,0.06);
            border: 1px solid rgba(58,58,140,0.08);
        }
        .floating-nav .logo {
            font-weight: 600;
            color: #3a3a8c;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 1.15rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .floating-nav nav { display: flex; gap: 0; }
        .floating-nav nav a {
            display: block;
            padding: 8px 18px;
            text-decoration: none;
            color: #8c8a9e;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-radius: 20px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .floating-nav nav a:hover {
            color: #3a3a8c;
            background: rgba(58,58,140,0.06);
        }
        .floating-nav nav a.active {
            color: #3a3a8c;
            background: rgba(58,58,140,0.1);
            font-weight: 500;
        }

        .sub-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 0 80px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sec-title {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3a3a8c;
            margin-bottom: 36px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e8e4f0;
            letter-spacing: 2px;
        }

        .profile-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }
        .profile-img {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: #eeecf5;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c5c0d4;
            font-size: 0.85rem;
            box-shadow: 0 4px 24px rgba(58,58,140,0.05);
        }
        .profile-img img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-text { flex: 1; }
        .profile-text p {
            margin-bottom: 10px;
            color: #5c5970;
            font-size: 1.05rem;
        }
        .profile-text .label {
            color: #3a3a8c;
            font-weight: 500;
            width: 90px;
            display: inline-block;
        }
        .profile-desc {
            margin-top: 24px;
            color: #807d94;
            font-size: 1rem;
            line-height: 2;
        }

        footer {
            text-align: center;
            padding: 32px;
            color: #b0adc4;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .sub-page { padding: 100px 24px 80px; }
        }
        @media (max-width: 640px) {
            .floating-nav {
                top: 8px;
                border-radius: 30px;
                padding: 6px 8px;
            }
            .floating-nav .logo { font-size: 0.95rem; padding: 6px 12px; }
            .floating-nav nav a { font-size: 0.8rem; padding: 6px 10px; }
            .sub-page { padding: 80px 16px 60px; }
            .profile-layout { flex-direction: column; align-items: center; text-align: center; }
            .profile-text .label { display: block; width: auto; }
        }
    </style>
</head>
<body>

    <div class="floating-nav">
        <a href="index.html" class="logo">靛音もた</a>
        <nav>

            <a href="music.html">音乐</a>

        </div>
        <div class="profile-desc">
            <!-- 在这里写角色简介 -->

    </div>

    <footer>
        <p>&copy; 2026 靛音もた</p>
    </footer>


</body>
</html>
