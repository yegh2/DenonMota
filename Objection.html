<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页gh|Objection</title>
</head>
<body>
    <div id="xyz">11</div>
    <div id="1">11</div>
    <button onclick="requestPermission()">111</button>
    <script>
        function requestPermission() {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
            .then(state => {
                if (state === 'granted') {
                    startListening();
                } else {
                    alert('需要运动传感器权限才能使用');
                }
            })
            .catch(console.error);
    } else {
        // Android 或旧版 iOS 直接监听即可
        startListening();
    }
}

        function startListening() {
        window.addEventListener('devicemotion', (event) => {
        const acc = event.accelerationIncludingGravity || event.acceleration || {};
        const x = acc.x ?? 0;
        const y = acc.y ?? 0;
        const z = acc.z ?? 0;

        document.getElementById("xyz").innerHTML = `X: ${x.toFixed(2)}<br>Y: ${y.toFixed(2)}<br>Z: ${z.toFixed(2)}`;
    });
}
    </script>
</body>
</html>
